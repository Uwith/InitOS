name: Debug macOS (tmate)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  debug:
    name: Interactive macOS debug
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Homebrew
        run: |
          set -euo pipefail
          brew --version

      - name: Build binary
        run: go build -o debug_tool .

      - name: Print connection instructions
        run: |
          echo "Once connected, run ./debug_tool to test the TUI."

      - name: Tmate session
        uses: mxschmitt/action-tmate@v3
        continue-on-error: true
        with:
          install-dependencies: false
          connect-timeout-seconds: 3300
